<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

/* ── THEME VARIABLES ── */
:root {
  --bg-body:    #0a0a0a;
  --bg-bar:     #0d0d0d;
  --bg-left:    #0a0a0a;
  --bg-right:   #0c0c0c;
  --bg-pill:    #111;
  --bg-ai:      #0f0f0f;
  --bg-note:    #111;
  --bg-hover:   #141414;
  --border:     #1a1a1a;
  --border-row: #0f0f0f;
  --border-sec: #161616;
  --border-note:#1e1e1e;
  --text-primary:  #e0e0e0;
  --text-nm:       #fff;
  --text-muted:    #444;
  --text-muted2:   #333;
  --text-val:      #ddd;
  --text-body:     #bbb;
  --text-ai:       #aaa;
  --text-th:       #333;
  --text-label:    #555;
  --tab-inactive:  #444;
  --tab-hover:     #888;
  --dot-border:    #0a0a0a;
  --sec-row-hover: #141414;
}
body.light {
  --bg-body:    #f4f4f0;
  --bg-bar:     #ffffff;
  --bg-left:    #f0f0ec;
  --bg-right:   #fafaf8;
  --bg-pill:    #f0f0ec;
  --bg-ai:      #f6f6f2;
  --bg-note:    #f6f6f2;
  --bg-hover:   #e8e8e4;
  --border:     #ddddd8;
  --border-row: #ebebea;
  --border-sec: #e0e0da;
  --border-note:#d0d0ca;
  --text-primary:  #1a1a1a;
  --text-nm:       #0a0a0a;
  --text-muted:    #888;
  --text-muted2:   #aaa;
  --text-val:      #222;
  --text-body:     #444;
  --text-ai:       #555;
  --text-ai-body:  #333;
  --text-th:       #999;
  --text-label:    #888;
  --tab-inactive:  #999;
  --tab-hover:     #555;
  --dot-border:    #f0f0ec;
  --sec-row-hover: #e8e8e4;
}

body { font-family: 'JetBrains Mono', monospace; background: var(--bg-body); color: var(--text-primary); display: flex; flex-direction: column; transition: background 0.2s, color 0.2s; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; background: var(--bg-bar);
  border-bottom: 1px solid var(--border); padding: 0 14px; flex-shrink: 0; gap: 0;
  transition: background 0.2s, border-color 0.2s;
}
.top-logo { font-size: 11px; color: #d4a017; font-weight: 700; letter-spacing: 0.08em; margin-right: 20px; white-space: nowrap; }
.tab {
  padding: 11px 14px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; color: var(--tab-inactive); border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap;
}
.tab.active { color: #d4a017; border-bottom-color: #d4a017; }
.tab:hover:not(.active) { color: var(--tab-hover); }

/* Theme toggle button */
.theme-btn {
  margin-left: auto; background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 9px; cursor: pointer; font-size: 14px;
  line-height: 1; color: var(--text-muted); transition: all 0.15s; flex-shrink: 0;
}
.theme-btn:hover { border-color: #d4a017; color: #d4a017; }

/* ── LAYOUT ── */
.main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
.left-panel { width: 360px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-left); transition: background 0.2s; }
.right-panel { flex: 1; background: var(--bg-right); border-left: 1px solid var(--border); overflow-y: auto; min-width: 0; transition: background 0.2s, border-color 0.2s; }

canvas { cursor: pointer; display: block; }

/* ── RIGHT PANEL ── */
.detail-wrap { padding: 16px 18px; }

.stock-hero { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.stock-nm { font-size: 20px; font-weight: 700; color: var(--text-nm); letter-spacing: -0.02em; }
.stock-fullnm { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
.price-block { text-align: right; }
.ltp { font-size: 26px; font-weight: 700; color: #d4a017; font-variant-numeric: tabular-nums; }
.chg-badge { font-size: 11px; padding: 3px 8px; border-radius: 3px; font-weight: 600; display: inline-block; margin-top: 3px; }
.up { background: #0a2a1a; color: #27ae60; }
.dn { background: #2a0a0a; color: #e74c3c; }
body.light .up { background: #d4f5e4; color: #1a7a42; }
body.light .dn { background: #fde8e8; color: #c0392b; }

/* 52W bar */
.bar52 { margin-bottom: 12px; }
.bar52-track { height: 3px; background: var(--border); border-radius: 2px; position: relative; margin: 5px 0; }
.bar52-fill { position: absolute; top: 0; height: 100%; width: 100%; background: linear-gradient(90deg,#e74c3c,#d4a017 50%,#27ae60); border-radius: 2px; opacity: 0.35; }
.bar52-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; background: #d4a017; border-radius: 50%; border: 2px solid var(--dot-border); }
.bar52-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); }

/* Status pills */
.status-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.spill {
  font-size: 9px; padding: 4px 10px; border-radius: 3px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  border: 1px solid transparent; transition: all 0.15s;
}
.spill.active { border-color: currentColor; }
.s-w { color: #7e8af1; } .s-g { color: #d4a017; } .s-h { color: #27ae60; } .s-a { color: #e74c3c; }

/* Section header */
.sec-hd {
  font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  margin: 16px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border-sec);
  display: flex; justify-content: space-between; align-items: center;
}

/* Data table */
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 4px; }
.data-table th {
  text-align: left; color: var(--text-th); font-weight: 400; font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 8px; border-bottom: 1px solid var(--border-sec);
}
.data-table th.r { text-align: right; }
.data-table td { padding: 6px 8px; border-bottom: 1px solid var(--border-row); color: var(--text-body); vertical-align: middle; }
.data-table td.label { color: var(--text-label); font-size: 10px; width: 38%; }
.data-table td.val { color: var(--text-val); font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
.data-table td.green { color: #27ae60; font-weight: 600; text-align: right; }
.data-table td.amber { color: #d4a017; font-weight: 600; text-align: right; }
.data-table td.red { color: #e74c3c; font-weight: 600; text-align: right; }
.data-table tr:last-child td { border-bottom: none; }
body.light .data-table td.green { color: #1a7a42; }
body.light .data-table td.red   { color: #c0392b; }

/* Tech pills */
.tech-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tech-pill { flex: 1; min-width: 72px; background: var(--bg-pill); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; transition: background 0.2s; }
.tech-pill-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.tech-pill-val { font-size: 14px; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }
.tech-pill-sig { font-size: 8px; margin-top: 2px; }
.sig-buy { color: #27ae60; } .sig-sell { color: #e74c3c; } .sig-neut { color: #888; }
body.light .sig-buy  { color: #1a7a42; }
body.light .sig-sell { color: #c0392b; }

/* Zone table */
.zone-tbl { width: 100%; border-collapse: collapse; }
.zone-tbl td { padding: 7px 8px; border-bottom: 1px solid var(--border-row); font-size: 11px; }
.zone-tbl td.zlabel { color: var(--text-label); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; width: 32%; }
.zone-tbl td.zprice { font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; width: 28%; }
.zone-tbl td.zdesc { color: var(--text-label); font-size: 10px; }
.z1 { color: #e74c3c; } .z2 { color: #d4a017; } .z3 { color: #27ae60; }
.zone-tbl tr:last-child td { border-bottom: none; }
body.light .z1 { color: #c0392b; }
body.light .z3 { color: #1a7a42; }

/* AI box */
.ai-box { background: var(--bg-ai); border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-size: 11px; line-height: 1.75; color: var(--text-ai); transition: background 0.2s; }
.ai-loading { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 11px; }
.pulse { width: 6px; height: 6px; background: #d4a017; border-radius: 50%; animation: pulse 1s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
.ai-section-title { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.ai-section-body { font-size: 11px; line-height: 1.75; color: var(--text-body); margin-bottom: 12px; }

/* Note */
.note-area {
  width: 100%; background: var(--bg-note); border: 1px solid var(--border-note); border-radius: 5px;
  color: var(--text-val); font-family: 'JetBrains Mono', monospace; font-size: 11px;
  padding: 10px; resize: vertical; min-height: 80px; outline: none; line-height: 1.6;
  transition: background 0.2s;
}
.note-area:focus { border-color: #d4a017; }

/* Empty */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; padding: 40px; }
.empty-ico { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Sector list table */
.sector-stock-row { cursor: pointer; transition: background 0.1s; }
.sector-stock-row:hover td { background: var(--sec-row-hover); }
</style>
</head>

/* ── WHEEL SETUP ── */
const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const cx=170, cy=170, R0=35, R1=85, R2=162;
let selSec=null, selStk=null, activeTab='eq', hov=null;
const notes = {};

function getStocks(sec){ return STOCKS[sec.id] || []; }

/* ── DRAW ── */
function drawWheel(){
  const lt = document.body.classList.contains('light');
  const C = {
    bg:      lt ? '#f0f0ec' : '#0d0d0d',
    outerBg: lt ? '#e8e8e4' : '#0c0c0c',
    inner:   lt ? '#f6f6f2' : '#141414',
    innerH:  lt ? '#e8e8e4' : '#1e1e1e',
    seg:     lt ? '#fafaf8' : '#121212',
    segH:    lt ? '#e8e8e4' : '#1a1a1a',
    stroke:  lt ? '#ddddd8' : '#0a0a0a',
    count:   lt ? '#aaa'    : '#444',
    symDef:  lt ? '#666'    : '#888',
  };

  ctx.clearRect(0,0,340,340);
  ctx.beginPath(); ctx.arc(cx,cy,R2+4,0,Math.PI*2); ctx.fillStyle=C.bg; ctx.fill();

  // centre button
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,R0);
  g.addColorStop(0,'#ffd700'); g.addColorStop(0.6,'#8b6914'); g.addColorStop(1,'#2a1800');
  ctx.beginPath(); ctx.arc(cx,cy,R0,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.fillStyle='#000'; ctx.font='bold 9px JetBrains Mono';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('START',cx,cy);

  if(!selSec){
    SECTORS.forEach((sec,i)=>{
      const n=SECTORS.length, a0=i/n*Math.PI*2-Math.PI/2, a1=(i+1)/n*Math.PI*2-Math.PI/2, mid=(a0+a1)/2;
      const isH = hov===`s${i}`;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R2,a0,a1); ctx.closePath();
      const ltColors = {'#0d2035':'#d0e8f8','#0d2010':'#d0f0e0','#200d20':'#f0d0f0','#20180d':'#f5e8d0','#0d1520':'#d0e4f5','#200d0d':'#f5d0d0'};
      ctx.fillStyle = isH ? shiftColor(sec.color) : (lt ? (ltColors[sec.color]||'#e8e8e8') : sec.color); ctx.fill();
      ctx.strokeStyle=C.stroke; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R1,a0,a1); ctx.closePath();
      ctx.fillStyle = isH ? C.innerH : C.inner; ctx.fill();
      ctx.strokeStyle=C.stroke; ctx.stroke();
      const lr = (R1+R2)/2;
      ctx.fillStyle = sec.accent; ctx.font = `${isH?'bold ':''}10px JetBrains Mono`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(sec.label,cx+lr*Math.cos(mid),cy+lr*Math.sin(mid));
      ctx.fillStyle=C.count; ctx.font='9px JetBrains Mono';
      ctx.fillText(getStocks(sec).length, cx+((R0+R1)/2)*Math.cos(mid), cy+((R0+R1)/2)*Math.sin(mid));
    });
  } else {
    const stocks = getStocks(selSec), n = stocks.length;
    ctx.beginPath(); ctx.arc(cx,cy,R2+4,0,Math.PI*2); ctx.fillStyle=C.outerBg; ctx.fill();
    stocks.forEach((stk,i)=>{
      const a0=i/n*Math.PI*2-Math.PI/2, a1=(i+1)/n*Math.PI*2-Math.PI/2, mid=(a0+a1)/2;
      const isSel = selStk && selStk.sym===stk.sym, isH = hov===`t${i}`;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R2,a0,a1); ctx.closePath();
      ctx.fillStyle = isSel ? selSec.color : (isH ? C.segH : C.seg); ctx.fill();
      ctx.strokeStyle=C.stroke; ctx.lineWidth=isSel?2:1.5; ctx.stroke();
      if(isSel){ ctx.strokeStyle=selSec.accent; ctx.stroke(); }
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R1,a0,a1); ctx.closePath();
      ctx.fillStyle=lt?'#f6f6f2':'#0f0f0f'; ctx.fill(); ctx.strokeStyle=C.stroke; ctx.stroke();
      const sc={watching:lt?'#ccc':'#2a2a2a',gtt:'#d4a017',holding:'#27ae60',avoid:'#e74c3c'};
      ctx.beginPath(); ctx.arc(cx+(R1+10)*Math.cos(mid), cy+(R1+10)*Math.sin(mid), 4,0,Math.PI*2);
      ctx.fillStyle=sc[stk.status]||C.count; ctx.fill();
      const lr=(R1+R2)/2;
      ctx.save();
      ctx.translate(cx+lr*Math.cos(mid), cy+lr*Math.sin(mid));
      ctx.rotate(mid+Math.PI/2);
      ctx.fillStyle = isSel ? selSec.accent : C.symDef;
      ctx.font = `${isSel?'bold ':''}9px JetBrains Mono`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(stk.sym.length>8?stk.sym.slice(0,7)+'…':stk.sym, 0, 0);
      ctx.restore();
    });
    ctx.fillStyle=selSec.accent; ctx.font='bold 8px JetBrains Mono';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('← BACK', cx, cy-11);
    ctx.fillStyle=C.count; ctx.font='7px JetBrains Mono';
    ctx.fillText(selSec.label, cx, cy+2);
  }
}

function shiftColor(hex){
  const lt = document.body.classList.contains('light');
  if(lt){
    // In light mode return a soft tinted version instead of near-black
    const map = {
      '#0d2035':'#d0e8f8', '#0d2010':'#d0f0e0', '#200d20':'#f0d0f0',
      '#20180d':'#f5e8d0', '#0d1520':'#d0e4f5', '#200d0d':'#f5d0d0',
    };
    return map[hex] || '#e8e8e8';
  }
  return hex.replace(/([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i, (_,r,g,b)=>{
    const shift = v => Math.min(255,parseInt(v,16)+24).toString(16).padStart(2,'0');
    return shift(r)+shift(g)+shift(b);
  });
}

/* ── EVENTS ── */
canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect(), dx=e.clientX-r.left-cx, dy=e.clientY-r.top-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  let ang=Math.atan2(dy,dx)+Math.PI/2; if(ang<0)ang+=Math.PI*2;
  if(dist<R0){ reset(); return; }
  if(!selSec){
    if(dist<R2){
      const i=Math.floor(ang/(Math.PI*2)*SECTORS.length)%SECTORS.length;
      selSec=SECTORS[i]; selStk=null; renderSectorList();
    }
  } else {
    const stocks=getStocks(selSec);
    if(dist>R1&&dist<R2){
      const i=Math.floor(ang/(Math.PI*2)*stocks.length)%stocks.length;
      selStk=stocks[i]; renderTab();
    } else if(dist<R1){ selSec=null; selStk=null; renderEmpty(); }
  }
  drawWheel();
});

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect(), dx=e.clientX-r.left-cx, dy=e.clientY-r.top-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  let ang=Math.atan2(dy,dx)+Math.PI/2; if(ang<0)ang+=Math.PI*2;
  const prev=hov; hov=null;
  if(dist>R0){
    if(!selSec&&dist<R2) hov=`s${Math.floor(ang/(Math.PI*2)*SECTORS.length)%SECTORS.length}`;
    else if(selSec&&dist>R1&&dist<R2) hov=`t${Math.floor(ang/(Math.PI*2)*getStocks(selSec).length)%getStocks(selSec).length}`;
  }
  canvas.style.cursor=(hov||dist<R0)?'pointer':'default';
  if(prev!==hov) drawWheel();
});

/* ── TAB SWITCHING ── */
function switchTab(t){
  activeTab=t;
  ['eq','tech','opts','ai','notes'].forEach(x=>{
    const el=document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));
    if(el) el.classList.toggle('active', x===t);
  });
  if(selStk) renderTab();
}

function renderTab(){
  if(!selStk) return;
  ({eq:renderEquity, tech:renderTech, opts:renderOpts, ai:renderAI, notes:renderNotes})[activeTab]?.();
}

      <tr><td class="label">Expires worthless if</td><td class="green">LTP &lt; ${ce1} at expiry</td></tr>
      <tr><td class="label">Exit rule</td>           <td class="amber">50% premium decay → exit</td></tr>
      <tr><td class="label">Stop loss</td>           <td class="red">2× premium received</td></tr>
    </table>
    ${zoneRows(s)}
  </div>`;
}

/* ── TAB: AI ANALYSIS ── */
async function renderAI(){
  const s=selStk;
  document.getElementById('rightPanel').innerHTML=`<div class="detail-wrap">
    ${heroHTML(s)}
    <div class="sec-hd">AI Analysis <span style="color:#2a2a2a;font-size:9px">Claude API</span></div>
    <div class="ai-box">
      <div class="ai-loading"><div class="pulse"></div>Analysing ${s.sym}…</div>
    </div>
  </div>`;

  const prompt = `You are a concise Indian equity analyst. Analyse ${s.sym} (${s.name}) with these data points:
LTP ₹${s.ltp} | Chg ${s.chg}% | 52W ₹${s.l52}–₹${s.h52}
PE ${s.pe}x | PB ${s.pb}x | ROE ${s.roe}% | EPS growth ${s.epsG}% | Rev growth ${s.revG}%
Net margin ${s.npm}% | Promoter ${s.promoter}% | Div yield ${s.div}% | Debt ${s.debt}
RSI ${s.rsi} | EMA20 ${s.ema20} | EMA50 ${s.ema50} | EMA200 ${s.ema200}
MACD ${s.macd} vs Signal ${s.signal} | BB ${s.bb_l}–${s.bb_u}
GTT zones Z1 ₹${s.zones[0]} / Z2 ₹${s.zones[1]} / Z3 ₹${s.zones[2]}
Trader note: "${notes[s.sym]||s.note}"

Respond with exactly 4 labelled sections. Each section title on its own line in ALL CAPS followed by a colon. Then 2–3 sentences. No bullet points. Under 200 words total.

CURRENT RELEVANCE:
TECHNICAL READ:
FUNDAMENTAL VERDICT:
TRADE RECOMMENDATION:`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const txt = data.content?.find(b=>b.type==='text')?.text || '';
    const sections = txt.split(/\n(?=[A-Z ]+:)/).filter(Boolean);
    let html = '';
    sections.forEach(sec=>{
      const nl = sec.indexOf('\n');
      const title = nl>-1 ? sec.slice(0,nl).replace(':','') : sec;
      const body  = nl>-1 ? sec.slice(nl+1).trim() : '';
      if(body) html += `<div style="margin-bottom:12px"><div class="ai-section-title">${title}</div><div class="ai-section-body">${body}</div></div>`;
    });
    document.querySelector('.ai-box').innerHTML = html || `<div class="ai-section-body">${txt}</div>`;
  } catch(err){
    document.querySelector('.ai-box').innerHTML = `<span style="color:#555">Analysis unavailable. Check API connectivity.</span>`;
  }
}

    <div class="sec-hd">Trade Notes</div>

/* ── SECTOR LIST ── */
function renderSectorList(){
  const sec=selSec, stocks=getStocks(sec);
  const sc={watching:'#2a2a2a',gtt:'#d4a017',holding:'#27ae60',avoid:'#e74c3c'};
  const sl={watching:'#888',  gtt:'#d4a017',holding:'#27ae60',avoid:'#e74c3c'};
  document.getElementById('rightPanel').innerHTML=`<div class="detail-wrap">
    <div style="color:${sec.accent};font-size:18px;font-weight:700;margin-bottom:4px">${sec.label}</div>
    <div style="font-size:10px;color:#444;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.08em">${stocks.length} stocks tracked — click to drill in</div>
    <table class="data-table">
      <tr><th>Symbol</th><th>Name</th><th class="r">LTP</th><th class="r">Chg%</th><th class="r">Status</th></tr>
      ${stocks.map(s=>`
      <tr class="sector-stock-row" onclick="clickStock('${s.sym}')">
        <td style="color:#ddd;font-weight:600">${s.sym}</td>
        <td style="color:#555;font-size:10px">${s.name}</td>
        <td class="val">₹${s.ltp.toLocaleString('en-IN')}</td>
        <td class="${s.chg>=0?'green':'red'}">${s.chg>=0?'+':''}${s.chg}%</td>
        <td style="text-align:right"><span style="font-size:9px;padding:3px 8px;border-radius:3px;font-weight:600;color:${sl[s.status]};background:${sc[s.status]}18;border:1px solid ${sc[s.status]}44">${s.status.toUpperCase()}</span></td>
      </tr>`).join('')}
    </table>
  </div>`;
}

/* ── HELPERS ── */
function reset(){
  selSec=null; selStk=null; renderEmpty(); drawWheel();
}
function renderEmpty(){
  document.getElementById('rightPanel').innerHTML=`<div class="empty" style="height:100%">
    <div class="empty-ico">◎</div>
    <div style="font-size:13px;color:#444">Select a sector, then a stock</div>
    <div style="font-size:10px;color:#333;margin-top:6px">Status dots: 🟡 GTT &nbsp; 🟢 Holding &nbsp; ⚫ Watching &nbsp; 🔴 Avoid</div>
  </div>`;
}
function clickStock(sym){
  if(!selSec) return;
  selStk = getStocks(selSec).find(s=>s.sym===sym);
  if(selStk){ renderTab(); drawWheel(); }
}
function setStatus(status){
  if(!selStk) return;
  selStk.status=status; renderTab(); drawWheel();
}

/* ── THEME TOGGLE ── */
let isDark = true;
function toggleTheme(){
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  drawWheel();
}

/* ── INIT ── */
drawWheel();
</script>
